# Recyclarr configuration — TRaSH Guides as code.
# Docs: https://recyclarr.dev   Templates: `recyclarr list templates`
#
# API keys are injected from .env (SONARR_API_KEY / RADARR_API_KEY) via !env_var,
# so this file is safe to commit. base_url uses the compose service DNS names on
# the `homelab` network.
#
# After editing, force a sync without waiting for cron:
#   docker exec recyclarr recyclarr sync

sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    include:
      - template: sonarr-quality-definition-series
      - template: sonarr-v4-quality-profile-web-1080p
      - template: sonarr-v4-custom-formats-web-1080p

    quality_profiles:
      - name: WEB-1080p

radarr:
  movies:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    include:
      - template: radarr-quality-definition-movie
      - template: radarr-quality-profile-hd-bluray-web
      - template: radarr-custom-formats-hd-bluray-web

    quality_profiles:
      - name: HD Bluray + WEB
